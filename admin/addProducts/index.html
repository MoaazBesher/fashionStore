<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - Fashion Store Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #e91e63;
            --primary-dark: #c2185b;
            --primary-light: #fce4ec;
            --secondary: #212121;
            --white: #ffffff;
            --light-bg: #fafafa;
            --text: #333333;
            --text-light: #666666;
            --text-lighter: #999999;
            --border: #e0e0e0;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.12);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.16);
            --shadow-glow: 0 0 30px rgba(233,30,99,0.3);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 30px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 50%, #e3f2fd 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(233,30,99,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(99,102,241,0.15) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 550px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 35px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header-icon {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-glow);
        }

        .header-icon i {
            font-size: 1.4rem;
            color: white;
        }

        .header-text h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--secondary);
        }

        .header-text p {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-family: inherit;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-add {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            gap: 10px;
            margin-top: 10px;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .btn-add:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            margin-top: 20px;
        }

        .btn-back {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px;
            background: var(--light-bg);
            color: var(--text-light);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            gap: 8px;
            text-decoration: none;
        }

        .btn-back:hover {
            background: var(--primary-light);
            color: var(--primary);
            border-color: var(--primary);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--secondary);
            color: white;
            padding: 14px 24px;
            border-radius: var(--radius-md);
            z-index: 3000;
            opacity: 0;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: #4caf50;
        }

        .toast.error {
            background: #f44336;
        }

        @media (max-width: 768px) {
            .card {
                padding: 25px;
            }

            .header {
                gap: 12px;
            }

            .header-icon {
                width: 48px;
                height: 48px;
            }

            .header-icon i {
                font-size: 1.2rem;
            }

            .header-text h1 {
                font-size: 1.2rem;
            }

            .form-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .card {
                padding: 20px;
                border-radius: var(--radius-md);
            }

            .header {
                flex-direction: column;
                text-align: center;
                padding-bottom: 15px;
            }

            .header-icon {
                width: 45px;
                height: 45px;
            }

            .header-text h1 {
                font-size: 1.1rem;
            }

            .header-text p {
                font-size: 0.8rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .form-group {
                margin-bottom: 15px;
            }

            .form-group label {
                font-size: 0.85rem;
            }

            .form-group input,
            .form-group select {
                padding: 10px 12px;
                font-size: 0.9rem;
            }

            .btn-add {
                padding: 12px;
                font-size: 0.9rem;
            }

            .btn-back {
                padding: 10px;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 360px) {
            body {
                padding: 15px 10px;
            }

            .card {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="header-icon">
                    <i class="fas fa-plus-circle"></i>
                </div>
                <div class="header-text">
                    <h1>Add New Product</h1>
                    <p>Fashion Store Admin</p>
                </div>
            </div>
            
            <div class="add-product-form">
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" placeholder="Enter product name">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="productPrice">Price</label>
                        <input type="text" id="productPrice" placeholder="$19.99">
                    </div>
                    
                    <div class="form-group">
                        <label for="productCategory">Category</label>
                        <select id="productCategory">
                            <option value="dress">Dress</option>
                            <option value="bag">Bag</option>
                            <option value="accessory">Accessory</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="productRating">Rating (1-5)</label>
                    <input type="number" id="productRating" min="1" max="5" value="4">
                </div>
                
                <div class="form-group">
                    <label for="productImage">Main Image URL</label>
                    <input type="text" id="productImage" placeholder="https://example.com/image.jpg">
                </div>
                
                <div class="form-group">
                    <label for="productImages">Gallery Images (comma separated)</label>
                    <input type="text" id="productImages" placeholder="https://img1.jpg, https://img2.jpg">
                </div>
                
                <button id="addProductBtn" class="btn-add">
                    <i class="fas fa-plus-circle"></i>
                    Add Product
                </button>
            </div>
            
            <div class="back-link">
                <a href="../../admin/" class="btn-back">
                    <i class="fas fa-arrow-left"></i>
                    Back to Dashboard
                </a>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    
    <script>
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCbv5agQov4LyezPbWM_XC8qk8bkbh8EX8",
            authDomain: "market-products-d3b84.firebaseapp.com",
            databaseURL: "https://market-products-d3b84-default-rtdb.firebaseio.com",
            projectId: "market-products-d3b84",
            storageBucket: "market-products-d3b84.appspot.com",
            messagingSenderId: "383604293089",
            appId: "1:383604293089:web:a59e21488df2f0bdbfe6a0",
            measurementId: "G-HK5H94NJZG"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        document.getElementById("addProductBtn").addEventListener("click", async () => {
            const btn = document.getElementById("addProductBtn");
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Adding...';

            const name = document.getElementById("productName").value.trim();
            const price = document.getElementById("productPrice").value.trim();
            const category = document.getElementById("productCategory").value;
            const rating = parseInt(document.getElementById("productRating").value);
            const image = document.getElementById("productImage").value.trim();
            const images = document.getElementById("productImages").value.split(",").map(img => img.trim()).filter(img => img);

            if (!name || !price || !image) {
                showToast('Please fill all required fields!', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-plus-circle"></i> Add Product';
                return;
            }

            const newProduct = {
                name,
                price,
                category,
                rating,
                image,
                images: images.length > 0 ? images : [image],
                createdAt: firebase.database.ServerValue.TIMESTAMP
            };

            try {
                await database.ref('products').push(newProduct);
                showToast('Product added successfully!', 'success');
                // Clear form
                document.querySelectorAll(".add-product-form input").forEach(input => input.value = "");
            } catch (error) {
                console.error("Error: ", error);
                showToast('Error adding product. Please try again.', 'error');
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-plus-circle"></i> Add Product';
        });
    </script>
</body>
</html>
