<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Products - Fashion Store Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #e91e63;
      --primary-dark: #c2185b;
      --primary-light: #fce4ec;
      --secondary: #212121;
      --white: #ffffff;
      --light-bg: #fafafa;
      --text: #333333;
      --text-light: #666666;
      --text-lighter: #999999;
      --border: #e0e0e0;
      --success: #4caf50;
      --error: #f44336;
      --warning: #ff9800;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.12);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.16);
      --shadow-glow: 0 0 30px rgba(233,30,99,0.3);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 50%, #e3f2fd 100%);
      min-height: 100vh;
      padding: 30px 20px;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 70%, rgba(233,30,99,0.1) 0%, transparent 50%);
      animation: bgFloat 20s ease-in-out infinite;
    }

    @keyframes bgFloat {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, -30px); }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: var(--radius-lg);
      padding: 30px;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 15px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .header-icon {
      width: 55px;
      height: 55px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-glow);
    }

    .header-icon i {
      font-size: 1.4rem;
      color: white;
    }

    .header-text h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--secondary);
    }

    .header-text p {
      font-size: 0.85rem;
      color: var(--text-light);
    }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 10px 20px;
      background: var(--light-bg);
      border: 2px solid transparent;
      border-radius: var(--radius-md);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-light);
      cursor: pointer;
      transition: var(--transition);
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary);
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .product-card {
      background: white;
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-lg);
    }

    .product-image {
      position: relative;
      height: 200px;
      overflow: hidden;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: var(--transition);
    }

    .product-card:hover .product-image img {
      transform: scale(1.05);
    }

    .badge {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 6px 14px;
      border-radius: var(--radius-xl);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge.available {
      background: var(--success);
      color: white;
    }

    .badge.out-of-stock {
      background: var(--error);
      color: white;
    }

    .product-info {
      padding: 18px;
    }

    .product-info h3 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--secondary);
      margin-bottom: 8px;
    }

    .product-info .stars {
      color: #ffc107;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .product-info .price {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 5px;
    }

    .product-info .category {
      font-size: 0.85rem;
      color: var(--text-light);
    }

    .product-actions {
      display: flex;
      gap: 8px;
      padding: 0 18px 18px;
    }

    .action-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .view-btn {
      background: var(--primary);
      color: white;
    }

    .view-btn:hover {
      background: var(--primary-dark);
    }

    .stock-btn {
      background: var(--warning);
      color: white;
    }

    .stock-btn:hover {
      background: #f57c00;
    }

    .delete-btn {
      background: var(--error);
      color: white;
    }

    .delete-btn:hover {
      background: #d32f2f;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 2000;
      padding: 30px;
      overflow-y: auto;
      backdrop-filter: blur(5px);
    }

    .modal-content {
      background: white;
      border-radius: var(--radius-lg);
      max-width: 800px;
      margin: 0 auto;
      position: relative;
      animation: scaleIn 0.3s ease;
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 40px;
      height: 40px;
      background: var(--light-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      border: none;
      font-size: 1.2rem;
      color: var(--text-light);
      z-index: 10;
    }

    .modal-close:hover {
      background: var(--primary);
      color: white;
    }

    .modal-body {
      padding: 30px;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .submit-btn:hover {
      background: var(--primary-dark);
    }

    /* Edit Modal Styles */
    .edit-modal-content {
      max-width: 700px;
      padding: 0;
      overflow: hidden;
    }

    .edit-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 20px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .edit-header h2 {
      margin: 0;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .edit-header .modal-close {
      background: rgba(255,255,255,0.2);
      color: white;
    }

    .edit-header .modal-close:hover {
      background: rgba(255,255,255,0.3);
    }

    .edit-form {
      padding: 25px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 15px;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    .form-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text);
      font-size: 0.9rem;
    }

    .form-group label i {
      color: var(--primary);
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      transition: var(--transition);
      background: var(--white);
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(233,30,99,0.1);
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: var(--text-lighter);
    }

    .form-actions {
      display: flex;
      gap: 15px;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .form-actions .submit-btn {
      flex: 1;
      padding: 14px 25px;
    }

    .btn-cancel {
      padding: 14px 25px;
      background: var(--light-bg);
      color: var(--text);
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-cancel:hover {
      background: var(--border);
    }

    @media (max-width: 600px) {
      .form-row {
        grid-template-columns: 1fr;
        gap: 0;
      }
      
      .form-actions {
        flex-direction: column-reverse;
      }
    }

    .modal-image {
      width: 100%;
      max-height: 300px;
      object-fit: contain;
      border-radius: var(--radius-md);
      margin-bottom: 20px;
    }

    .modal-details h2 {
      font-size: 1.5rem;
      color: var(--secondary);
      margin-bottom: 10px;
    }

    .modal-details p {
      margin: 10px 0;
      color: var(--text-light);
    }

    .modal-details .price {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
    }

    .back-link {
      text-align: center;
      margin-top: 25px;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 25px;
      background: var(--light-bg);
      color: var(--text-light);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
    }

    .btn-back:hover {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--secondary);
      color: white;
      padding: 14px 24px;
      border-radius: var(--radius-md);
      z-index: 3000;
      opacity: 0;
      transition: var(--transition);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success { background: var(--success); }
    .toast.error { background: var(--error); }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }

      .header-icon {
        width: 48px;
        height: 48px;
      }

      .header-text h1 {
        font-size: 1.2rem;
      }

      .filters {
        flex-wrap: wrap;
      }

      .filter-btn {
        padding: 8px 14px;
        font-size: 0.8rem;
      }

      .products-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .product-image {
        height: 150px;
      }

      .product-info {
        padding: 12px;
      }

      .product-info h3 {
        font-size: 0.9rem;
      }

      .product-info .price {
        font-size: 1rem;
      }

      .product-actions {
        padding: 0 12px 12px;
        gap: 6px;
      }

      .action-btn {
        padding: 8px;
        font-size: 0.75rem;
      }

      .action-btn i {
        display: none;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 20px 10px;
      }

      .card {
        padding: 20px 15px;
        border-radius: var(--radius-md);
      }

      .header {
        padding-bottom: 15px;
      }

      .header-left {
        flex-direction: column;
        gap: 10px;
      }

      .header-icon {
        width: 42px;
        height: 42px;
      }

      .header-icon i {
        font-size: 1.1rem;
      }

      .header-text h1 {
        font-size: 1.1rem;
      }

      .header-text p {
        font-size: 0.8rem;
      }

      .filters {
        padding-bottom: 5px;
      }

      .filter-btn {
        padding: 8px 12px;
        font-size: 0.75rem;
      }

      .products-grid {
        grid-template-columns: 1fr;
        gap: 15px;
      }

      .product-image {
        height: 180px;
      }

      .product-card {
        border-radius: var(--radius-sm);
      }

      .product-info h3 {
        font-size: 0.85rem;
      }

      .product-info .stars {
        font-size: 0.8rem;
      }

      .product-info .category {
        font-size: 0.75rem;
      }

      .badge {
        padding: 4px 10px;
        font-size: 0.65rem;
      }

      .product-actions {
        flex-wrap: wrap;
      }

      .action-btn {
        flex: 1 1 auto;
        min-width: 60px;
        padding: 8px 5px;
        font-size: 0.7rem;
      }

      .action-btn i {
        display: inline;
        font-size: 0.7rem;
      }

      .btn-back {
        padding: 10px 15px;
        font-size: 0.85rem;
      }

      .modal-content {
        margin: 10px;
        padding: 20px 15px;
      }

      .modal-body {
        padding: 15px;
      }

      .modal-image {
        max-height: 200px;
      }

      .modal-details h2 {
        font-size: 1.2rem;
      }

      .modal-details p {
        font-size: 0.85rem;
      }

      .modal-details .price {
        font-size: 1.2rem;
      }
    }

    @media (max-width: 360px) {
      .filters {
        gap: 5px;
      }

      .filter-btn {
        padding: 6px 10px;
        font-size: 0.7rem;
      }

      .product-image {
        height: 150px;
      }

      .product-info h3 {
        font-size: 0.8rem;
      }

      .product-info .price {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="header-left">
          <div class="header-icon">
            <i class="fas fa-boxes-stacked"></i>
          </div>
          <div class="header-text">
            <h1>Manage Products</h1>
            <p>Fashion Store Admin</p>
          </div>
        </div>
        <div class="filters">
          <button class="filter-btn active" data-status="all">All</button>
          <button class="filter-btn" data-status="available">Available</button>
          <button class="filter-btn" data-status="out_of_stock">Out of Stock</button>
        </div>
      </div>

      <div class="products-grid" id="productsGrid"></div>

      <div class="back-link">
        <a href="../index.html" class="btn-back">
          <i class="fas fa-arrow-left"></i>
          Back to Dashboard
        </a>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="productModal" class="modal">
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <div class="modal-body" id="productDetails"></div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="modal">
    <div class="modal-content edit-modal-content">
      <div class="edit-header">
        <h2><i class="fas fa-edit"></i> Edit Product</h2>
        <button class="modal-close" onclick="closeEditModal()">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <form id="editForm" class="edit-form">
        <input type="hidden" id="editId">
        
        <div class="form-row">
          <div class="form-group">
            <label><i class="fas fa-tag"></i> Product Name</label>
            <input type="text" id="editName" required placeholder="Enter product name">
          </div>
          <div class="form-group">
            <label><i class="fas fa-dollar-sign"></i> Price</label>
            <input type="text" id="editPrice" required placeholder="e.g. $99.99">
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label><i class="fas fa-list"></i> Category</label>
            <select id="editCategory">
              <option value="dress">Dress</option>
              <option value="bag">Bag</option>
              <option value="accessory">Accessory</option>
            </select>
          </div>
          <div class="form-group">
            <label><i class="fas fa-star"></i> Rating (1-5)</label>
            <input type="number" id="editRating" min="1" max="5" value="5">
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label><i class="fas fa-check-circle"></i> Availability</label>
            <select id="editAvailability">
              <option value="available">Available</option>
              <option value="out_of_stock">Out of Stock</option>
            </select>
          </div>
          <div class="form-group">
            <label><i class="fas fa-image"></i> Image URL</label>
            <input type="text" id="editImage" placeholder="https://...">
          </div>
        </div>
        
        <div class="form-group full-width">
          <label><i class="fas fa-align-left"></i> Description</label>
          <textarea id="editDescription" rows="3" placeholder="Product description..."></textarea>
        </div>
        
        <div class="form-actions">
          <button type="button" class="btn-cancel" onclick="closeEditModal()">
            <i class="fas fa-times"></i> Cancel
          </button>
          <button type="submit" class="submit-btn">
            <i class="fas fa-save"></i> Save Changes
          </button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <div id="toast" class="toast"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCbv5agQov4LyezPbWM_XC8qk8bkbh8EX8",
      authDomain: "market-products-d3b84.firebaseapp.com",
      databaseURL: "https://market-products-d3b84-default-rtdb.firebaseio.com",
      projectId: "market-products-d3b84",
      storageBucket: "market-products-d3b84.appspot.com",
      messagingSenderId: "383604293089",
      appId: "1:383604293089:web:a59e21488df2f0bdbfe6a0"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let allProducts = [];
    let currentFilter = 'all';

    function showToast(msg, type = 'info') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function loadProducts() {
      database.ref('products').on('value', snapshot => {
        allProducts = [];
        snapshot.forEach(child => {
          allProducts.push({ id: child.key, ...child.val() });
        });
        displayProducts();
      });
    }

    function displayProducts() {
      const grid = document.getElementById('productsGrid');
      const filtered = currentFilter === 'all' 
        ? allProducts 
        : allProducts.filter(p => (p.availability || 'available') === currentFilter);
      
      if (filtered.length === 0) {
        grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#666;padding:40px;">No products found</p>';
        return;
      }

      grid.innerHTML = filtered.map(p => {
        const isAvailable = p.availability !== 'out_of_stock';
        const rating = Math.max(0, Math.min(5, p.rating || 5));
        const stars = '★'.repeat(rating) + '☆'.repeat(5 - rating);
        return `
          <div class="product-card">
            <div class="product-image">
              <img src="${p.image}" alt="${p.name}">
              <span class="badge ${isAvailable ? 'available' : 'out-of-stock'}">
                ${isAvailable ? 'Available' : 'Out of Stock'}
              </span>
            </div>
            <div class="product-info">
              <h3>${p.name}</h3>
              <div class="stars">${stars}</div>
              <p class="price">${p.price}</p>
              <p class="category">${p.category || 'General'}</p>
            </div>
            <div class="product-actions">
              <button class="action-btn edit-btn" data-id="${p.id}">
                <i class="fas fa-edit"></i> Edit
              </button>
              <button class="action-btn stock-btn" data-id="${p.id}" data-status="${isAvailable ? 'out_of_stock' : 'available'}">
                <i class="fas fa-sync"></i> ${isAvailable ? 'Out' : 'In'}
              </button>
              <button class="action-btn delete-btn" data-id="${p.id}">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelector('.filter-btn.active').classList.remove('active');
        btn.classList.add('active');
        currentFilter = btn.dataset.status;
        displayProducts();
      });
    });

    // Product actions
    document.addEventListener('click', e => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const id = btn.dataset.id;
      
      if (btn.classList.contains('edit-btn')) {
        const p = allProducts.find(x => x.id === id);
        if (p) {
          openEditModal(p);
        }
      }
      else if (btn.classList.contains('stock-btn')) {
        const newStatus = btn.dataset.status;
        database.ref('products/' + id).update({ availability: newStatus })
          .then(() => showToast('Status updated!', 'success'));
      }
      else if (btn.classList.contains('delete-btn')) {
        if (confirm('Delete this product?')) {
          database.ref('products/' + id).remove()
            .then(() => showToast('Product deleted!', 'success'));
        }
      }
    });

    // Edit modal functions
    function openEditModal(product) {
      document.getElementById('editId').value = product.id;
      document.getElementById('editName').value = product.name || '';
      document.getElementById('editPrice').value = product.price || '';
      document.getElementById('editCategory').value = product.category || 'dress';
      document.getElementById('editRating').value = product.rating || 5;
      document.getElementById('editAvailability').value = product.availability || 'available';
      document.getElementById('editImage').value = product.image || '';
      document.getElementById('editDescription').value = product.description || '';
      document.getElementById('editModal').style.display = 'block';
    }

    function closeEditModal() {
      document.getElementById('editModal').style.display = 'none';
    }

    // Handle edit form submit
    document.getElementById('editForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const id = document.getElementById('editId').value;
      const updates = {
        name: document.getElementById('editName').value,
        price: document.getElementById('editPrice').value,
        category: document.getElementById('editCategory').value,
        rating: parseInt(document.getElementById('editRating').value),
        availability: document.getElementById('editAvailability').value,
        image: document.getElementById('editImage').value,
        description: document.getElementById('editDescription').value
      };
      
      database.ref('products/' + id).update(updates)
        .then(() => {
          showToast('Product updated successfully!', 'success');
          closeEditModal();
        })
        .catch(err => showToast('Error: ' + err.message, 'error'));
    });

    // Close modal
    document.querySelector('.modal-close').addEventListener('click', () => {
      document.getElementById('productModal').style.display = 'none';
      closeEditModal();
    });

    document.getElementById('productModal').addEventListener('click', e => {
      if (e.target.id === 'productModal') {
        document.getElementById('productModal').style.display = 'none';
      }
    });

    loadProducts();
  </script>
</body>
</html>
