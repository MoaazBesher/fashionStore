<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Fashion Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #e91e63;
            --primary-dark: #c2185b;
            --primary-light: #fce4ec;
            --secondary: #212121;
            --accent: #ff6b6b;
            --white: #ffffff;
            --light-bg: #fafafa;
            --text: #333333;
            --text-light: #666666;
            --text-lighter: #999999;
            --border: #e0e0e0;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.12);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.16);
            --shadow-glow: 0 0 30px rgba(233,30,99,0.3);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 30px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 50%, #e3f2fd 100%);
            position: relative;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(233,30,99,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(99,102,241,0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255,107,107,0.1) 0%, transparent 40%);
            animation: backgroundFloat 20s ease-in-out infinite;
        }

        @keyframes backgroundFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(5deg); }
            66% { transform: translate(-20px, 20px) rotate(-5deg); }
        }

        /* Floating shapes */
        .floating-shapes {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: var(--primary);
            top: -100px;
            left: -100px;
            animation: float1 15s ease-in-out infinite;
        }

        .shape-2 {
            width: 200px;
            height: 200px;
            background: var(--accent);
            bottom: -50px;
            right: -50px;
            animation: float2 18s ease-in-out infinite;
        }

        .shape-3 {
            width: 150px;
            height: 150px;
            background: #6366f1;
            top: 50%;
            right: 10%;
            animation: float3 12s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 50px); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-30px, -30px); }
        }

        @keyframes float3 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-20px, 20px); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        /* Login Card */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 40px 35px;
            box-shadow: var(--shadow-lg);
            text-align: center;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            box-shadow: var(--shadow-glow);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo i {
            font-size: 2rem;
            color: white;
        }

        .login-card h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 8px;
        }

        .login-card > p {
            color: var(--text-light);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px 20px;
            background: white;
            color: #5f6368;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            gap: 12px;
        }

        .btn-google:hover {
            background: #f8f9fa;
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-google i {
            font-size: 1.3rem;
            color: #4285f4;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: var(--text-lighter);
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            padding: 0 15px;
        }

        .error-message {
            color: #f44336;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Dashboard */
        .dashboard {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 35px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.6s ease;
        }

        .user-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 1px solid var(--border);
        }

        .user-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-light) 0%, #f3e5f5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: var(--shadow-glow);
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-avatar i {
            font-size: 1.8rem;
            color: var(--primary);
        }

        .user-details {
            text-align: left;
        }

        .user-details h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 4px;
        }

        .user-details p {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .dashboard-title {
            text-align: left;
            font-size: 1rem;
            color: var(--text-lighter);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .dashboard-btn {
            background: var(--light-bg);
            padding: 20px 15px;
            border-radius: var(--radius-md);
            text-decoration: none;
            text-align: center;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .dashboard-btn:hover {
            background: var(--primary-light);
            transform: translateY(-3px);
            box-shadow: var(--shadow-glow);
        }

        .dashboard-btn i {
            font-size: 1.6rem;
            color: var(--primary);
        }

        .dashboard-btn span {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--secondary);
        }

        .logout-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            background: var(--light-bg);
            color: var(--text-light);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            gap: 8px;
        }

        .logout-btn:hover {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-card {
                padding: 30px 25px;
            }

            .dashboard-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .dashboard-btn {
                padding: 15px 12px;
            }

            .dashboard-btn i {
                font-size: 1.4rem;
            }

            .dashboard-btn span {
                font-size: 0.85rem;
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 25px 20px;
            }

            .logo {
                width: 65px;
                height: 65px;
            }

            .logo i {
                font-size: 1.8rem;
            }

            .login-card h1 {
                font-size: 1.5rem;
            }

            .login-card > p {
                font-size: 0.85rem;
                margin-bottom: 20px;
            }

            .btn-google {
                padding: 12px 16px;
                font-size: 0.9rem;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .dashboard-btn {
                padding: 18px 15px;
            }

            .user-header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .user-avatar {
                width: 60px;
                height: 60px;
            }

            .user-details {
                text-align: center;
            }

            .user-details h2 {
                font-size: 1.2rem;
            }

            .user-details p {
                font-size: 0.85rem;
            }

            .logout-btn {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 360px) {
            body {
                padding: 15px;
            }

            .login-card {
                padding: 20px 18px;
                border-radius: var(--radius-md);
            }

            .floating-shapes {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Shapes -->
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <!-- Login Card -->
        <div class="login-card" id="loginContainer">
            <div class="logo">
                <i class="fas fa-shield-halved"></i>
            </div>
            <h1>Welcome Back</h1>
            <p>Sign in to access your admin dashboard</p>
            
            <button id="googleSignIn" class="btn-google">
                <i class="fab fa-google"></i>
                Continue with Google
            </button>
            
            <div class="divider">
                <span>Secure Access</span>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
        </div>
        
        <!-- Dashboard -->
        <div class="dashboard" id="dashboard">
            <div class="user-header">
                <div class="user-avatar" id="userAvatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="user-details">
                    <h2 id="userName">Admin User</h2>
                    <p id="userEmail">admin@store.com</p>
                </div>
            </div>
            
            <h3 class="dashboard-title">Dashboard Menu</h3>
            
            <div class="dashboard-grid">
                <a href="/admin/productsManager/" class="dashboard-btn">
                    <i class="fas fa-boxes-stacked"></i>
                    <span>Manage Products</span>
                </a>
                <a href="/admin/addProducts/" class="dashboard-btn">
                    <i class="fas fa-plus-circle"></i>
                    <span>Add Products</span>
                </a>
                <a href="/admin/adminOrders/" class="dashboard-btn">
                    <i class="fas fa-clipboard-list"></i>
                    <span>Manage Orders</span>
                </a>
                <a href="../index.html" class="dashboard-btn">
                    <i class="fas fa-store"></i>
                    <span>View Store</span>
                </a>
            </div>
            
            <button id="logoutBtn" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Sign Out
            </button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    
    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCbv5agQov4LyezPbWM_XC8qk8bkbh8EX8",
            authDomain: "market-products-d3b84.firebaseapp.com",
            databaseURL: "https://market-products-d3b84-default-rtdb.firebaseio.com",
            projectId: "market-products-d3b84",
            storageBucket: "market-products-d3b84.appspot.com",
            messagingSenderId: "383604293089",
            appId: "1:383604293089:web:a59e21488df2f0bdbfe6a0",
            measurementId: "G-HK5H94NJZG"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // Elements
        const loginContainer = document.getElementById('loginContainer');
        const dashboard = document.getElementById('dashboard');
        const googleSignIn = document.getElementById('googleSignIn');
        const logoutBtn = document.getElementById('logoutBtn');
        const errorMessage = document.getElementById('errorMessage');
        const userName = document.getElementById('userName');
        const userEmail = document.getElementById('userEmail');
        const userAvatar = document.getElementById('userAvatar');

        // Check auth state
        auth.onAuthStateChanged(user => {
            if (user) {
                showDashboard(user);
            } else {
                showLogin();
            }
        });

        // Sign in
        googleSignIn.addEventListener('click', () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then(result => {
                    console.log('Signed in:', result.user);
                })
                .catch(error => {
                    console.error('Sign in error:', error);
                    showError(error.message);
                });
        });

        // Sign out
        logoutBtn.addEventListener('click', () => {
            auth.signOut();
        });

        function showDashboard(user) {
            loginContainer.style.display = 'none';
            dashboard.style.display = 'block';
            
            if (user.displayName) {
                userName.textContent = user.displayName;
            } else if (user.email) {
                userName.textContent = user.email.split('@')[0];
            }
            
            userEmail.textContent = user.email;
            
            if (user.photoURL) {
                userAvatar.innerHTML = `<img src="${user.photoURL}" alt="Profile">`;
            }
        }

        function showLogin() {
            loginContainer.style.display = 'block';
            dashboard.style.display = 'none';
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }
    </script>
</body>
</html>
